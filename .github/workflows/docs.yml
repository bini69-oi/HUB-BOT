name: Docs

# Validates that the VitePress docs build on every change to docs-site.
# The canonical docs are self-hosted at docs.vpn-hub.pro (deploy via scripts/deploy-docs.sh);
# GitHub Pages is not used, so this workflow only builds (no deploy step that could fail).
# To publish a github.io mirror instead: enable Settings → Pages → Source "GitHub Actions",
# then add back an actions/deploy-pages@v4 job that consumes the built dist.

on:
  push:
    branches: [main]
    paths: ["docs-site/**", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["docs-site/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install deps
        run: npm ci --prefix docs-site

      - name: Build site
        run: npm run build --prefix docs-site
        env:
          DOCS_BASE: /HUB-BOT/
