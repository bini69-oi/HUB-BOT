<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />

      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"

    <link rel="preconnect" href="https://fonts.googleapis.com" />
